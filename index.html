<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ====== FONDO ====== */
body {
    font-family: 'Poppins', sans-serif;
    margin:0;
    display:flex;
    background: linear-gradient(135deg, #fdfbfb, #ebedee);
    overflow-x: hidden; /* 🔥 evita que se corte */
}

/* ====== SIDEBAR CLARO ====== */
.sidebar {
    width: 30%;
min-width: 180px;
max-width: 260px;
    background: #ffffff;
    color:#444;
    padding:1.5rem 1rem;
    height:100vh;
    box-shadow: 4px 0 20px rgba(0,0,0,0.05);
    border-right:1px solid #eee;
}

.sidebar h2 {
    text-align:center;
    margin-bottom:1.5rem;
    color:#ff4f81;
    font-weight:700;
}

/* BOTONES MENU */
.sidebar button {
    width:100%;
    margin:8px 0;
    padding:12px;
    background:#f8f8f8;
    border:none;
    color:#444;
    cursor:pointer;
    border-radius:12px;
    transition:0.25s;
    font-weight:500;
}

.sidebar button:hover {
    background: linear-gradient(45deg, #ff6a88, #ff99ac);
    color:white;
    transform:translateX(5px);
}

/* ====== MAIN ====== */
.main {
    flex:1;
    padding:1rem;
    overflow-x: auto;
}

/* ====== CARDS ====== */
.card {
    background:white;
    padding:1.3rem;
    border-radius:18px;
    margin-bottom:1rem;
    box-shadow:0 10px 25px rgba(0,0,0,0.06);
    transition:0.25s;
}

.card:hover {
    transform:translateY(-4px);
}

/* ====== TITULOS ====== */
h3 {
    margin-top:0;
    color:#ff4f81;
}

/* ====== INPUTS ====== */
.input-group {
    margin-bottom:0.6rem;
}

.input-group label {
    font-size:0.75rem;
    color:#666;
}

input, select, textarea {
    width:100%;
    padding:9px;
    font-size:0.85rem;
    border-radius:10px;
    border:1px solid #eee;
    background:#fafafa;
    transition:0.2s;
}

input:focus, select:focus, textarea:focus {
    outline:none;
    border-color:#ff6a88;
    background:white;
    box-shadow:0 0 5px rgba(255,106,136,0.2);
}

/* ====== BOTONES ====== */
button.btn {
    padding:9px 15px;
    margin-right:5px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:500;
    transition:0.2s;
}

.btn-add {
    background: linear-gradient(45deg, #ff6a88, #ff99ac);
}

.btn-remove {
    background: linear-gradient(45deg, #ff4d6d, #ff758f);
}

.btn-update {
    background: linear-gradient(45deg, #c77dff, #9d4edd);
}

button.btn:hover {
    transform:scale(1.05);
    opacity:0.9;
}

/* ====== STOCK MEJORADO ====== */
.stock-container {
    margin-top: 20px;          /* Crea el espacio respecto a los botones */
    padding: 12px 18px;
    background: #fff0f3;       /* Fondo rosado muy suave */
    border-radius: 12px;
    display: inline-block;     /* Para que no ocupe todo el ancho */
    border: 1px solid #ffccd5;
}

.stock-label {
    font-size: 0.85rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
}

.stock-number {
    font-size: 1.2rem;
    color: #ff4f81;           /* Tu color principal */
    font-weight: 800;
    margin-left: 8px;
}


/* ====== TABLA ====== */
table {
    width:100%;
    border-collapse:collapse;
    margin-top:0.5rem;
    border-radius:12px;
    overflow:hidden;
}

th {
    background:#ff4f81;
    color:white;
    padding:10px;
}

td {
    padding:8px;
    background:#fff;
    border-bottom:1px solid #f1f1f1;
}

tr:nth-child(even) td {
    background:#fafafa;
}

tr:hover td {
    background:#ffe4ec;
}

/* ====== SCROLL ====== */
::-webkit-scrollbar {
    width:8px;
}
::-webkit-scrollbar-thumb {
    background:#ff6a88;
    border-radius:10px;
}

/* --- NUEVO CUADRO DE SELECCIÓN --- */
.modal-overlay {
    display: none; /* Oculto por defecto */
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px);
    z-index: 9999; justify-content: center; align-items: center;
}

.modal-content {
    background: white; 
    width: 85%; 
    max-width: 350px;
    border-radius: 25px; 
    padding: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    border: 2px solid #ff4f81;

    /* 👇 AGREGA ESTAS DOS LÍNEAS 👇 */
    max-height: 230px;  /* Altura máxima antes de que aparezca el scroll */
    overflow-y: auto;   /* Activa el scroll vertical */
}

.modal-titulo {
    color: #ff4f81; font-weight: bold; margin-bottom: 15px;
    text-align: center; font-size: 1.1rem; text-transform: uppercase;
}

.opcion-item {
    padding: 12px 15px; margin: 8px 0;
    background: #fff5f7; border-radius: 12px;
    cursor: pointer; color: #444; font-weight: 500;
    transition: 0.2s; border: 1px solid transparent;
}

.opcion-item:hover {
    background: #ffecf1; border-color: #ff4f81; transform: scale(1.02);
}

.historial-container {
    max-height: 300px;   /* altura máxima del historial */
    overflow-y: auto;    /* scroll vertical */
    margin-top: 0.5rem;
}

/* Scroll bonito */
.historial-container::-webkit-scrollbar {
    width: 8px;
}

.historial-container::-webkit-scrollbar-thumb {
    background: #ff6a88;
    border-radius: 10px;
}

.historial-container::-webkit-scrollbar-track {
    background: #ffe4ec;
    border-radius: 10px;
}

* {
    box-sizing: border-box;
}

@media screen and (max-width: 900px) {

    .sidebar {
        width: 35%;
        min-width: 140px;
    }

    .main {
        width: 65%;
        padding: 0.8rem;
    }

    h2 {
        font-size: 1.2rem;
    }

    h3 {
        font-size: 1rem;
    }

    input, select, textarea {
        font-size: 0.75rem;
        padding: 7px;
    }

    button {
        font-size: 0.75rem;
        padding: 8px;
    }
}

@media screen and (orientation: landscape) {
    .sidebar {
        width: 30%;
    }

    .main {
        width: 70%;
    }
}

</style>
</head>

<script>
// Datos iniciales
let inventory={ropa:{}, calzado:{}, celular:{}, utiles:{}, implementos:{}};
let currentProduct={ropa:'', calzado:'', celular:'', utiles:'', implementos:''};

// Productos
const ropaList=['Camisa Amarilla','Camisa Blanca','Pantalón Marrón','Chompa Azul']; // <--- AQUÍ agregas más ropa
const calzadoList=['Botín Negro','Zapato Negro','Forcei']; // <--- AQUÍ agregas más calzado
const celularList=['Samsung','iPhone', 'juego']; // <--- AQUÍ agregas más celulares
const utilesList=['Lapicero','Cuaderno A4','Archivador','Cinta de Embalaje','Papel Bond']; // <--- AQUÍ agregas más útiles
const implementosList=['Batos','Linterna','Cartuchera','Vara']; // <--- AQUÍ agregas más implementos

// Inicialización
function init(){
    let select;
    select=document.getElementById('ropa-producto'); ropaList.forEach(p=>select.add(new Option(p)));
    select=document.getElementById('calzado-producto'); calzadoList.forEach(p=>select.add(new Option(p)));
    select=document.getElementById('celular-producto'); celularList.forEach(p=>select.add(new Option(p)));
    select=document.getElementById('utiles-producto'); utilesList.forEach(p=>select.add(new Option(p)));
    select=document.getElementById('implementos-producto'); implementosList.forEach(p=>select.add(new Option(p)));

    let tallaRopa=document.getElementById('ropa-talla'); ['S','M','L','XL','XXL','XXXL'].forEach(t=>tallaRopa.add(new Option(t)));
    let tallaCalzado=document.getElementById('calzado-talla'); for(let i=34;i<=60;i++) tallaCalzado.add(new Option(i));
}

// Mostrar panel
function showPanel(panel){
    ['ropa','calzado','celulares','utiles','implementos'].forEach(p=>document.getElementById('panel-'+p).style.display='none');
    document.getElementById('panel-'+panel).style.display='block';
}

// Selección producto
function selectProduct(type){
    const sel = document.getElementById(type+'-producto');
    currentProduct[type] = sel.value;

    if(type === 'celular'){
        // Reemplazo aquí
        if(!inventory.celular[currentProduct.celular]) {
            inventory.celular[currentProduct.celular] = {number:'',operator:''};
        }
        document.getElementById('celular-actual').value = inventory.celular[currentProduct.celular].number || "";
        document.getElementById('celular-operador').value = inventory.celular[currentProduct.celular].operator || "";
        
        // Limpieza de inputs
        document.getElementById('celular-nuevo').value = '';
        document.getElementById('celular-obs').value = '';
    } else {
        updateStockView(type);
        document.getElementById(type+'-obs').value = '';
    }

    // Actualizar stock visual siempre, con retraso
    setTimeout(() => {
        updateStockView(type);
    }, 100);
}

// Actualizar stock visual
function updateStockView(type){
    let stockSpan, key, qty;
    if(type==='ropa'){
        key=currentProduct.ropa+'|'+document.getElementById('ropa-talla').value+'|'+document.getElementById('ropa-estado').value;
        stockSpan=document.getElementById('ropa-stock');
        qty=inventory.ropa[key]||0;
        stockSpan.innerText=qty;
        stockSpan.style.color=qty>0?'green':'red';
    } else if(type==='calzado'){
        key=currentProduct.calzado+'|'+document.getElementById('calzado-talla').value+'|'+document.getElementById('calzado-estado').value;
        stockSpan=document.getElementById('calzado-stock');
        qty=inventory.calzado[key]||0;
        stockSpan.innerText=qty;
        stockSpan.style.color=qty>0?'green':'red';
    } else if(type==='utiles'){
        key=currentProduct.utiles+'|'+document.getElementById('utiles-estado').value;
        stockSpan=document.getElementById('utiles-stock');
        qty=inventory.utiles[key]||0;
        stockSpan.innerText=qty;
        stockSpan.style.color=qty>0?'green':'red';
    } else if(type==='implementos'){
        key=currentProduct.implementos+'|'+document.getElementById('implementos-estado').value;
        stockSpan=document.getElementById('implementos-stock');
        qty=inventory.implementos[key]||0;
        stockSpan.innerText=qty;
        stockSpan.style.color=qty>0?'green':'red';
    }
}

// Modificar stock
function modifyStock(type,action){
    let producto, talla='', estado, qty, obs, key;
    if(type==='ropa'){
        producto=currentProduct.ropa;
        talla=document.getElementById('ropa-talla').value;
        estado=document.getElementById('ropa-estado').value;
        qty=parseInt(document.getElementById('ropa-cantidad').value);
        obs=document.getElementById('ropa-obs').value;
        key=producto+'|'+talla+'|'+estado;
        if(!inventory.ropa[key]) inventory.ropa[key]=0;
        if(action==='remove' && qty>inventory.ropa[key]) { alert('No hay suficiente stock'); return; }
        inventory.ropa[key]+=(action==='add'?qty:-qty);
        updateStockView('ropa');
        addHistory(new Date().toLocaleString(),producto,talla,estado,action==='add'?'Agregado':'Retirado',qty,obs);
    } else if(type==='calzado'){
        producto=currentProduct.calzado;
        talla=document.getElementById('calzado-talla').value;
        estado=document.getElementById('calzado-estado').value;
        qty=parseInt(document.getElementById('calzado-cantidad').value);
        obs=document.getElementById('calzado-obs').value;
        key=producto+'|'+talla+'|'+estado;
        if(!inventory.calzado[key]) inventory.calzado[key]=0;
        if(action==='remove' && qty>inventory.calzado[key]) { alert('No hay suficiente stock'); return; }
        inventory.calzado[key]+=(action==='add'?qty:-qty);
        updateStockView('calzado');
        let textoPares = qty === 1 ? '1 par' : qty + ' pares';
addHistory(new Date().toLocaleString(),producto,talla,estado,action==='add'?'Agregado':'Retirado',textoPares,obs);
    } else if(type==='utiles'){
        producto=currentProduct.utiles;
        estado=document.getElementById('utiles-estado').value;
        qty=parseInt(document.getElementById('utiles-cantidad').value);
        obs=document.getElementById('utiles-obs').value;
        key=producto+'|'+estado;
        if(!inventory.utiles[key]) inventory.utiles[key]=0;
        if(action==='remove' && qty>inventory.utiles[key]) { alert('No hay suficiente stock'); return; }
        inventory.utiles[key]+=(action==='add'?qty:-qty);
        updateStockView('utiles');
        addHistory(new Date().toLocaleString(),producto,'N/A',estado,action==='add'?'Agregado':'Retirado',qty,obs);
    } else if(type==='implementos'){
        producto=currentProduct.implementos;
        estado=document.getElementById('implementos-estado').value;
        qty=parseInt(document.getElementById('implementos-cantidad').value);
        obs=document.getElementById('implementos-obs').value;
        key=producto+'|'+estado;
        if(!inventory.implementos[key]) inventory.implementos[key]=0;
        if(action==='remove' && qty>inventory.implementos[key]) { alert('No hay suficiente stock'); return; }
        inventory.implementos[key]+=(action==='add'?qty:-qty);
        updateStockView('implementos');
        addHistory(new Date().toLocaleString(),producto,'N/A',estado,action==='add'?'Agregado':'Retirado',qty,obs);
    }
}

// Actualizar número celular
function updateCellNumber(){
    const producto=currentProduct.celular;
    const numero=document.getElementById('celular-nuevo').value.trim();
    const operador=document.getElementById('celular-operador').value.trim();
    const obs=document.getElementById('celular-obs').value;
    if(!producto) return alert('Seleccione un celular');
    if(!numero) return alert('Ingrese un nuevo número');
    inventory.celular[producto]={number:numero,operator:operador};
    document.getElementById('celular-actual').value=numero;
    addHistory(new Date().toLocaleString(),producto,'N/A','N/A','Actualizado',1,obs);
    document.getElementById('celular-nuevo').value='';
    document.getElementById('celular-obs').value='';
  
    fetch("https://script.google.com/macros/s/AKfycbz-6MWjzw9IULXxu-lslKq_I0NvfRBH2n-j-r9rCXnqz8Mg-c3pBkW6iIxQsq3ppGSw/exec", {
    method: "POST",
    body: JSON.stringify({
        producto: producto,
        talla: "N/A",
        estado: "N/A",
        accion: "Actualización de número",
        cantidad: 1,
        obs: obs,
        numero: numero,
        operador: operador
    })
})
.then(res => res.text())
.then(res => console.log("Celular guardado:", res))
.catch(err => console.error("Error:", err));
    
}

// Agregar al historial
function addHistory(fecha,prod,talla,estado,accion,cant,obs){
    let tbody=document.getElementById('historial-body');
    let row=document.createElement('tr');

    if(accion==='Agregado') row.style.color='green';
    else if(accion==='Retirado') row.style.color='red';
    else row.style.color='blue';

    let estadoColor = estado === 'Nuevo' ? 'green' : 'orange';

    row.innerHTML=`
    <td>${fecha}</td>
    <td>${prod}</td>
    <td>${talla}</td>
    <td style="color:${estadoColor}; font-weight:bold;">${estado}</td>
    <td>${accion}</td>
    <td>${cant}</td>
    <td>${obs}</td>
    `;

    tbody.prepend(row);
    fetch("https://script.google.com/macros/s/AKfycbz-6MWjzw9IULXxu-lslKq_I0NvfRBH2n-j-r9rCXnqz8Mg-c3pBkW6iIxQsq3ppGSw/exec", {
    method: "POST",
    body: JSON.stringify({
        producto: prod,
        talla: talla,
        estado: estado,
        accion: accion,
        cantidad: cant,
        obs: obs,
        numero: "",
        operador: ""
    })
})
.then(res => res.text())
.then(res => console.log("Enviado:", res))
.catch(err => console.error("Error:", err));
}

function addHistoryVisual(fecha, prod, talla, estado, accion, cant, obs) {
    let tbody = document.getElementById('historial-body');
    let row = document.createElement('tr');

    if(accion==='Agregado') row.style.color='green';
    else if(accion==='Retirado') row.style.color='red';
    else row.style.color='blue';

    let estadoColor = estado === 'Nuevo' ? 'green' : 'orange';

    row.innerHTML = `
        <td>${fecha}</td>
        <td>${prod}</td>
        <td>${talla}</td>
        <td style="color:${estadoColor}; font-weight:bold;">${estado}</td>
        <td>${accion}</td>
        <td>${cant}</td>
        <td>${obs}</td>
    `;

    tbody.prepend(row);
}

// Inicialización
init();
cargarDatos();

function abrirSelectorPersonalizado(idSelect, tipo) {
    const selectOriginal = document.getElementById(idSelect);
    const contenedor = document.getElementById('contenedorOpciones');
    const modal = document.getElementById('miModal');
    
    contenedor.innerHTML = '';

    Array.from(selectOriginal.options).forEach(opt => {
        const div = document.createElement('div');
        div.className = 'opcion-item';
        div.innerText = opt.text;

        div.onclick = () => {
            selectOriginal.value = opt.value;

            // 🔥 Detecta si es producto, talla o estado
            if (idSelect.includes('producto')) {
                selectProduct(tipo);
            } else {
                updateStockView(tipo);
            }

            modal.style.display = 'none';
        };

        contenedor.appendChild(div);
    }); // 👈 ESTA LÍNEA ES CLAVE (CIERRA EL forEach)

    modal.style.display = 'flex';
}

function login(){
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;

    if(user === "admin" && pass === "1234"){
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('panelApp').style.display = 'flex';
    } else {
        document.getElementById('errorLogin').innerText = "Usuario o contraseña incorrectos";
    }
}

function cargarDatos(){
    fetch("https://script.google.com/macros/s/AKfycbz-6MWjzw9IULXxu-lslKq_I0NvfRBH2n-j-r9rCXnqz8Mg-c3pBkW6iIxQsq3ppGSw/exec")
    .then(res => res.json())
    .then(data => {
        // Reiniciar inventario
        inventory = {ropa:{}, calzado:{}, celular:{}, utiles:{}, implementos:{}};

        // Limpiar historial visual
        document.getElementById('historial-body').innerHTML = "";

        // Recorrer filas del Google Sheet
        data.slice(1).forEach(row => {
            let producto = row[1];
            let talla = row[2];
            let estado = row[3];
            let accion = row[4];
            let cantidad = parseInt(row[5]) || 0;
            let obs = row[6];
            let numero = row[7];
            let operador = row[8];

            let tipo = detectarTipo(producto);
            if(!tipo) return; // Evita errores

            // 🔹 Reconstruir inventario
            if(tipo === 'celular'){
    // Solo guardar si hay número (última actualización válida)
    if(numero){
        inventory.celular[producto] = {
            number: numero,
            operator: operador || ""
        };
    }
}
             else {
                let key;

if(tipo === 'utiles' || tipo === 'implementos'){
    key = producto + "|" + estado;
} else {
    key = producto + "|" + talla + "|" + estado;
}
                if(!inventory[tipo][key]) inventory[tipo][key] = 0;
                inventory[tipo][key] += (accion === "Agregado" ? cantidad : -cantidad);
            }

            // 🔹 Solo mostrar historial en tabla, NO enviar POST
            addHistoryVisual(row[0], producto, talla, estado, accion, cantidad, obs);
        });

        console.log("✅ Inventario reconstruido:", inventory);
    });
}
function detectarTipo(producto){
    if(ropaList.includes(producto)) return 'ropa';
    if(calzadoList.includes(producto)) return 'calzado';
    if(utilesList.includes(producto)) return 'utiles';
    if(implementosList.includes(producto)) return 'implementos';
    if(celularList.includes(producto)) return 'celular';

    return null; // 👈 evita errores
}
